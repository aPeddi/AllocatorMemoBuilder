# Default mandate for the demo — a liquid, risk-adjusted core allocation.
name: "Equi Core — liquid, risk-adjusted"
benchmark_id: SP500
risk_free_annual: 0.02
top_n: 5

# Hard filters. Liquidity requirement + target-vol ceiling + drawdown tolerance,
# plus an explicit strategy exclusion. redemption_days is derived from each
# fund's stated terms (cadence + notice) in ingest.
constraints:
  - {field: redemption_days, op: "<=", value: 200}          # liquid within ~2 quarters
  - {field: ann_vol, op: "<=", value: 0.35}                 # target-vol ceiling
  - {field: max_drawdown, op: ">=", value: -0.35}           # max-drawdown tolerance
  - {field: strategy, op: not_in, value: ["Venture", "Real Assets"]}

# Scoring weights (metric -> weight). Signed automatically by scoring.DIRECTION.
weights:
  sharpe: 0.30
  sortino: 0.20
  calmar: 0.15
  ann_return: 0.15
  max_drawdown: 0.10
  ann_vol: 0.10
